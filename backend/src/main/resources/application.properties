# Database: a single SQLite file next to the jar - data stays on the user's disk
spring.datasource.url=jdbc:sqlite:generator-opinii.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Automatically create/update tables based on the entities (convenient for single-user use)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Serve the built frontend (React) as static files
spring.web.resources.static-locations=classpath:/static/

# Local port
server.port=8080

# Request size limit (reports can be long)
server.tomcat.max-http-form-post-size=5MB
